line-length = 120
target-version = "py312"

[lint]
select = ["E", "F", "W", "I", "UP", "S", "B", "A", "BLE", "C4", "SIM", "TCH", "RUF"]
# S603: subprocess call with shell=False — expected, this package wraps subprocess calls
# S607: partial executable path — expected, CLI tool names are resolved via PATH
ignore = ["S603", "S607"]

[lint.per-file-ignores]
"src/ai_cli_runner/ai_models.py" = ["BLE001"]  # Best-effort methods intentionally catch broad exceptions
"src/ai_cli_runner/llm_pricing.py" = ["BLE001"]  # Best-effort methods intentionally catch broad exceptions
"tests/**" = ["S101"]
